events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript application/json;

  # Let's Encrypt doğrulama + HTTP → HTTPS yönlendirme
  server {
    listen 80;
    server_name $DOMAIN;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      # localhost'ta HTTPS yok, direkt frontend'e yönlendir
      # Canlıda bu satırı aşağıdaki return ile değiştir:
      # return 301 https://$host$request_uri;
      proxy_pass         http://frontend:80;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/ {
      proxy_pass         http://backend:3001;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 120s;
    }
  }

  # HTTPS (sadece gerçek domain'de, sertifika aldıktan sonra aktif)
  # server {
  #   listen 443 ssl;
  #   server_name $DOMAIN;
  #
  #   ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #   add_header X-Frame-Options           DENY                                  always;
  #   add_header X-Content-Type-Options    nosniff                               always;
  #
  #   location / {
  #     proxy_pass         http://frontend:80;
  #     proxy_set_header   X-Forwarded-Proto https;
  #   }
  #
  #   location /api/ {
  #     proxy_pass         http://backend:3001;
  #     proxy_set_header   X-Forwarded-Proto https;
  #     proxy_read_timeout 120s;
  #   }
  # }
}
