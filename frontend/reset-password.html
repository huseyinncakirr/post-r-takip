<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DikDur – Şifre Sıfırlama</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #020617; color: #e2e8f0; font-family: 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.kart { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px;
  width: 100%; max-width: 400px; padding: 36px; }
.logo { text-align: center; margin-bottom: 28px; }
.logo-yazi { font-size: 22px; font-weight: 800; }
.logo-yazi span { color: #22d3ee; }
.alan label { display: block; font-size: 12px; color: #94a3b8; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.alan input { width: 100%; background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; padding: 11px 14px; color: #e2e8f0; font-size: 14px; }
.alan input:focus { outline: none; border-color: #6366f1; }
.alan { margin-bottom: 16px; }
.btn { width: 100%; background: linear-gradient(135deg,#6366f1,#4f46e5);
  color: white; border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn:disabled { opacity: .6; cursor: default; }
.mesaj { text-align: center; font-size: 13px; margin-top: 14px; min-height: 18px; }
.geri { text-align: center; margin-top: 20px; font-size: 13px; }
.geri a { color: #6366f1; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="kart">
  <div class="logo">
    <div class="logo-yazi">Dik<span>Dur</span></div>
  </div>

  <div id="yukleniyor" style="text-align:center;color:#64748b;padding:20px">Token doğrulanıyor…</div>

  <div id="formAlani" style="display:none">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;text-align:center">🔑 Yeni Şifre Belirle</div>
    <div class="alan">
      <label>Yeni Şifre</label>
      <input type="password" id="yeniSifre" placeholder="En az 6 karakter">
    </div>
    <div class="alan">
      <label>Şifre Tekrar</label>
      <input type="password" id="yeniSifreTekrar" placeholder="Şifreyi tekrar girin">
    </div>
    <button class="btn" id="kaydetBtn" onclick="sifreyiKaydet()">Şifremi Güncelle</button>
    <div class="mesaj" id="mesaj"></div>
  </div>

  <div id="hataMesaji" style="display:none;text-align:center;color:#ef4444;padding:16px;line-height:1.6"></div>
  <div id="basariMesaji" style="display:none;text-align:center;padding:20px">
    <div style="font-size:40px;margin-bottom:12px">✅</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:8px">Şifreniz Güncellendi!</div>
    <div style="font-size:13px;color:#64748b">Yeni şifrenizle giriş yapabilirsiniz.</div>
  </div>

  <div class="geri"><a href="/login.html">← Giriş Sayfasına Dön</a></div>
</div>

<script>
var API   = '/api';
var token = new URLSearchParams(location.search).get('token');

if (!token) {
  document.getElementById('yukleniyor').style.display = 'none';
  document.getElementById('hataMesaji').style.display  = 'block';
  document.getElementById('hataMesaji').textContent = '❌ Geçersiz bağlantı. Lütfen yeni bir sıfırlama talebi oluşturun.';
} else {
  document.getElementById('yukleniyor').style.display = 'none';
  document.getElementById('formAlani').style.display  = 'block';
}

async function sifreyiKaydet() {
  var yeni    = document.getElementById('yeniSifre').value;
  var tekrar  = document.getElementById('yeniSifreTekrar').value;
  var mesajEl = document.getElementById('mesaj');
  var btn     = document.getElementById('kaydetBtn');

  if (yeni.length < 6) { mesajEl.style.color='#ef4444'; mesajEl.textContent='Şifre en az 6 karakter olmalı.'; return; }
  if (yeni !== tekrar) { mesajEl.style.color='#ef4444'; mesajEl.textContent='Şifreler eşleşmiyor.'; return; }

  btn.disabled = true; btn.textContent = 'Kaydediliyor…';
  try {
    var r = await fetch(API + '/auth/reset-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: yeni })
    });
    var d = await r.json();
    if (!r.ok) {
      mesajEl.style.color='#ef4444';
      mesajEl.textContent = d.error || 'Hata oluştu.';
      btn.disabled = false; btn.textContent = 'Şifremi Güncelle';
      return;
    }
    document.getElementById('formAlani').style.display  = 'none';
    document.getElementById('basariMesaji').style.display = 'block';
    setTimeout(() => { location.href = '/login.html'; }, 3000);
  } catch {
    mesajEl.style.color='#ef4444'; mesajEl.textContent='Bağlantı hatası.';
    btn.disabled = false; btn.textContent = 'Şifremi Güncelle';
  }
}
</script>
</body>
</html>
